<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桌面字幕</title>
    <link rel="stylesheet" href="subtitle.css">
</head>
<body>
    <div id="drag-overlay" class="hidden">ALT MOVE MODE // 拖曳字幕位置</div>
    <div id="subtitle-container">
        <div id="status-panel" class="status-idle">
            <span id="status-dot"></span>
            <span id="status-label">待機中</span>
        </div>
        <div id="text-panel">
            <div id="text">等待語音輸入… 按 Shift + F2 啟動</div>
        </div>
    </div>
    <script src="subtitle.js"></script>
</body>
</html>
